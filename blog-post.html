<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title id="docTitle">The Journal — Local Web SA</title>
<meta name="description" id="metaDesc" content="A weekly essay for South African small business owners on why having a website matters." />
<meta name="theme-color" content="#0000FF" />
<meta property="og:type" content="article" />
<meta property="og:site_name" content="Local Web SA" />
<meta property="og:title" id="ogTitle" content="The Journal — Local Web SA" />
<meta property="og:description" id="ogDesc" content="A weekly essay for South African small business owners." />
<meta property="og:url" id="ogUrl" content="https://localwebsa.org/blog.html" />
<meta property="og:image" content="https://localwebsa.org/assets/hero/scene-b-web.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" id="twTitle" content="The Journal — Local Web SA" />
<meta name="twitter:description" id="twDesc" content="A weekly essay for South African small business owners." />
<meta name="twitter:image" content="https://localwebsa.org/assets/hero/scene-b-web.jpg" />
<link rel="canonical" id="canonicalLink" href="https://localwebsa.org/blog.html" />
<link rel="icon" href="assets/icon-192.png" />
<link rel="apple-touch-icon" href="assets/icon-180.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=6" />
<script defer data-domain="localwebsa.org" src="https://plausible.io/js/script.js"></script>
</head>
<body>
<div id="navMount"></div>

<article class="post" id="postRoot" data-screen-label="07 Blog Post"></article>

<section class="black tight">
  <div class="wrap">
    <div class="more-head fade-in">
      <span class="eyebrow">More from the Journal</span>
      <h2 class="h2" style="margin-top:10px">Keep reading.</h2>
    </div>
    <div class="blog-grid" id="moreGrid"></div>
  </div>
</section>

<div id="footMount"></div>

<script src="blog-data.js"></script>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug') || (window.LWSA_POSTS[0] && window.LWSA_POSTS[0].slug);
  const post = window.LWSA_findPost(slug);
  const root = document.getElementById('postRoot');
  const more = document.getElementById('moreGrid');

  if (!post) {
    root.innerHTML = `
      <div class="wrap-narrow" style="padding:160px 0 80px;text-align:center">
        <span class="eyebrow" style="color:#3D52FF">404</span>
        <h1 class="h1" style="margin:18px 0">Essay not found.</h1>
        <p class="lede" style="margin:0 auto 28px">That post may have moved or its link is mistyped.</p>
        <a href="blog.html" class="btn btn-blue">Back to the Journal</a>
      </div>`;
    return;
  }

  // SEO/meta
  document.getElementById('docTitle').textContent = post.title + ' — Local Web SA';
  document.getElementById('metaDesc').setAttribute('content', post.excerpt);
  document.getElementById('ogTitle').setAttribute('content', post.title);
  document.getElementById('ogDesc').setAttribute('content', post.excerpt);
  document.getElementById('twTitle').setAttribute('content', post.title);
  document.getElementById('twDesc').setAttribute('content', post.excerpt);
  const postUrl = 'https://localwebsa.org/blog-post.html?slug=' + encodeURIComponent(post.slug);
  document.getElementById('ogUrl').setAttribute('content', postUrl);
  document.getElementById('canonicalLink').setAttribute('href', postUrl);

  const cover = window.LWSA_makeCover(post.slug, { w: 1600, h: 720 });

  root.innerHTML = `
    <header class="post-hero">
      <div class="post-cover">${cover}</div>
      <div class="post-hero-inner">
        <div class="wrap-narrow">
          <a href="blog.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            The Journal
          </a>
          <span class="post-tag">${post.tag}</span>
          <h1 class="post-title">${post.title}</h1>
          <div class="post-meta">
            <span>${post.date}</span>
            <span class="sep">·</span>
            <span>${post.readMin} min read</span>
          </div>
        </div>
      </div>
    </header>

    <div class="post-body wrap-narrow">
      <div class="post-prose">${post.body}</div>

      <div class="post-cta">
        <div>
          <span class="eyebrow" style="color:#3D52FF">Ready to be findable?</span>
          <h3 style="margin:10px 0 6px;font-size:22px">Your website. R799 once-off. Live in a week.</h3>
          <p style="color:var(--text-grey);margin:0">No retainers. No subscriptions. Just a professional site that does its job for you, while you sleep.</p>
        </div>
        <div class="post-cta-actions">
          <a href="contact.html" class="btn btn-blue">Get in touch
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
          <a href="pricing.html" class="btn btn-ghost-dark">See pricing</a>
        </div>
      </div>

      <div class="share-bar">
        <span class="share-label">Share this essay</span>
        <div class="share-buttons" id="shareButtons"></div>
      </div>
    </div>
  `;

  // Share buttons
  const links = window.LWSA_shareLinks(post);
  const sb = document.getElementById('shareButtons');
  const sbtn = (label, href, svg) => `<a class="share-btn" href="${href}" target="_blank" rel="noopener" aria-label="Share on ${label}" title="${label}">${svg}</a>`;
  sb.innerHTML = [
    sbtn('WhatsApp', links.whatsapp, '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.8-.9-2.1-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-1 1.2-.2.2-.4.2-.7.1-.3-.2-1.3-.5-2.5-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.7.1-.1.3-.4.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5-.1-.2-.7-1.7-1-2.3-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.2.2 2.2 3.4 5.3 4.7.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.2-.7.2-1.3.2-1.4-.1-.1-.3-.2-.6-.4zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.1-1.3c1.4.8 3.1 1.3 4.9 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>'),
    sbtn('X (Twitter)', links.twitter, '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2H21l-6.52 7.45L22 22h-6.937l-4.83-6.34L4.6 22H1.84l6.95-7.94L1.5 2h7.07l4.38 5.79L18.244 2zm-2.43 18h1.86L7.27 4H5.3l10.514 16z"/></svg>'),
    sbtn('Facebook', links.facebook, '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 21v-8h2.7l.4-3.1h-3.1V7.9c0-.9.25-1.5 1.55-1.5h1.65V3.6c-.3 0-1.3-.1-2.45-.1-2.4 0-4.05 1.45-4.05 4.1V9.9H7.5V13h2.7v8h3.3z"/></svg>'),
    sbtn('LinkedIn', links.linkedin, '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.22 8h4.56v14H.22V8zm7.5 0h4.36v1.92h.06c.61-1.15 2.1-2.36 4.32-2.36 4.62 0 5.48 3.04 5.48 7v7.44h-4.56v-6.6c0-1.58-.03-3.6-2.2-3.6-2.2 0-2.53 1.72-2.53 3.5V22H7.72V8z"/></svg>'),
    sbtn('Email', links.email, '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/></svg>'),
    `<button class="share-btn copy" id="copyBtn" aria-label="Copy link" title="Copy link">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
       <span>Copy link</span>
     </button>`
  ].join('');

  document.getElementById('copyBtn').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(links.url);
      const btn = document.getElementById('copyBtn');
      const span = btn.querySelector('span');
      const old = span.textContent;
      span.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { span.textContent = old; btn.classList.remove('copied'); }, 1800);
    } catch (e) {
      window.prompt('Copy this link:', links.url);
    }
  });

  // "Keep reading" — next 3 posts
  const others = window.LWSA_POSTS.filter(p => p.slug !== post.slug).slice(0, 3);
  more.innerHTML = others.map(p => `
    <a class="blog-card fade-in" href="blog-post.html?slug=${encodeURIComponent(p.slug)}">
      <div class="blog-cover">${window.LWSA_makeCover(p.slug)}<span class="tag">${p.tag}</span></div>
      <div class="blog-body">
        <span class="date">${p.date} · ${p.readMin} min read</span>
        <h3>${p.title}</h3>
        <p>${p.excerpt}</p>
        <span class="read">Read essay
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </span>
      </div>
    </a>`).join('');
})();
</script>
<script src="chrome.js"></script>
<script src="app.js"></script>
</body>
</html>
