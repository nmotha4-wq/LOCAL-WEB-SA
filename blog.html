<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Blog — Local Web SA</title>
<meta name="description" content="Short essays for South African small business owners on why having a website matters, and what every month without one costs you." />
<meta name="theme-color" content="#0000FF" />
<link rel="canonical" href="https://localwebsa.org/blog.html" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Local Web SA" />
<meta property="og:title" content="Blog — Local Web SA" />
<meta property="og:description" content="Short essays for South African small business owners on why having a website matters, and what every month without one costs you." />
<meta property="og:url" content="https://localwebsa.org/blog.html" />
<meta property="og:image" content="https://localwebsa.org/assets/hero/showcase-a-web.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Blog — Local Web SA" />
<meta name="twitter:description" content="Short essays for South African small business owners on why having a website matters." />
<meta name="twitter:image" content="https://localwebsa.org/assets/hero/showcase-a-web.png" />
<link rel="icon" href="assets/icon-192.png" />
<link rel="apple-touch-icon" href="assets/icon-180.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=10" />
<script defer data-domain="localwebsa.org" src="https://plausible.io/js/script.js"></script>
</head>
<body>
<div id="navMount"></div>

<section class="hero has-art short" data-screen-label="06 Blog Hero">
  <picture class="hero-art" aria-hidden="true">
    <source media="(max-width:768px)" srcset="assets/hero/showcase-b-mobile.jpg" />
    <img src="assets/hero/showcase-a-web.png" alt="" fetchpriority="high" decoding="async" />
  </picture>
  <div class="hero-art-scrim" aria-hidden="true"></div>
  <div class="wrap">
    <span class="eyebrow fade-in" style="color:#fff;opacity:.9">The Journal</span>
    <h1 class="h1 fade-in" style="margin-top:18px">Short essays for<br/><span class="cyan">business owners</span>.</h1>
    <p class="sub fade-in">A weekly read on why having a website matters, written for South African small business owners in plain language, five minutes or less.</p>
  </div>
</section>

<section class="black">
  <div class="wrap">
    <div class="blog-grid" id="blogGrid"></div>
  </div>
</section>

<div id="footMount"></div>

<script src="blog-data.js"></script>
<script>
(function(){
  const grid = document.getElementById('blogGrid');
  if (!grid || !window.LWSA_POSTS) return;
  const tpl = (p, featured) => `
    <a class="blog-card fade-in${featured ? ' featured' : ''}" href="blog-post.html?slug=${encodeURIComponent(p.slug)}" aria-label="${p.title}">
      <div class="blog-cover">${window.LWSA_makeCover(p.slug)}<span class="tag">${p.tag}</span></div>
      <div class="blog-body">
        <span class="date">${p.date} · ${p.readMin} min read</span>
        <h3>${p.title}</h3>
        <p>${p.excerpt}</p>
        <span class="read">Read essay
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </span>
      </div>
    </a>`;
  grid.innerHTML = window.LWSA_POSTS.map((p, i) => tpl(p, i === 0)).join('');
})();
</script>
<script src="chrome.js"></script>
<script src="app.js"></script>
</body>
</html>
